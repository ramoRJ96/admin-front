<mat-sidenav-container class="sidenav-container" autosize>
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidebar-header">
      <mat-icon class="logo-icon">account_balance</mat-icon>
      <span class="logo-text">GESTION</span>
    </div>

    <mat-nav-list>
      <div class="nav-section">PRINCIPAL</div>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" class="nav-item">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Tableau de bord</span>
      </a>

      <div class="nav-section">GESTION</div>
      <a mat-list-item routerLink="fiangonanas" routerLinkActive="active-link" class="nav-item">
        <mat-icon matListItemIcon>church</mat-icon>
        <span matListItemTitle>Fiangonana</span>
      </a>

      <div class="nav-section">FINANCES</div>
      <a mat-list-item routerLink="finance" routerLinkActive="active-link" class="nav-item">
        <mat-icon matListItemIcon>payments</mat-icon>
        <span matListItemTitle>Offrandes</span>
      </a>
      <a mat-list-item routerLink="expenses" routerLinkActive="active-link" class="nav-item">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Dépenses</span>
      </a>

      <div class="nav-section">ADMINISTRATION</div>
      <a mat-list-item routerLink="validations" routerLinkActive="active-link" class="nav-item">
        <mat-icon matListItemIcon>verified</mat-icon>
        <span matListItemTitle>Validations</span>
      </a>
    </mat-nav-list>

    <div class="sidebar-footer">
      <button mat-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Déconnexion
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="main-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-btn">
        <mat-icon>menu_open</mat-icon>
      </button>

      <div class="breadcrumb">
        <span class="muted">Pages</span> / <span>{{ currentRouteTitle }}</span>
      </div>

      <span class="spacer"></span>

      <div class="toolbar-actions">
        <div class="search-box">
          <mat-icon>search</mat-icon>
          <input type="text" placeholder="Rechercher...">
        </div>

        <button mat-icon-button>
          <mat-icon>notifications</mat-icon>
        </button>

        <div class="user-profile">
          <img src="https://ui-avatars.com/api/?name=Admin&background=4f46e5&color=fff" alt="Avatar">
        </div>
      </div>
    </mat-toolbar>

    <div class="content">
      <div class="content-header">
        <h1>{{ currentRouteTitle }}</h1>
        <p class="subtitle">Gérez vos activités en toute simplicité.</p>
      </div>
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
