<div class="stats-grid">
  <mat-card class="stat-card">
    <div class="stat-icon purple">
      <mat-icon>church</mat-icon>
    </div>
    <div class="stat-content">
      <p class="stat-label">Fiangonanas</p>
      <h3 class="stat-value">Active</h3>
    </div>
  </mat-card>

  <mat-card class="stat-card">
    <div class="stat-icon green">
      <mat-icon>payments</mat-icon>
    </div>
    <div class="stat-content">
      <p class="stat-label">Offrandes</p>
      <h3 class="stat-value">Hebdo</h3>
    </div>
  </mat-card>

  <mat-card class="stat-card">
    <div class="stat-icon blue">
      <mat-icon>receipt_long</mat-icon>
    </div>
    <div class="stat-content">
      <p class="stat-label">Dépenses</p>
      <h3 class="stat-value">Suivi</h3>
    </div>
  </mat-card>
</div>

<div class="dashboard-grid">
  <mat-card class="chart-card main-chart">
    <mat-card-header>
      <mat-card-title>Offrandes par Fiangonana</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div *ngIf="isLoading" class="spinner-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
      <div *ngIf="!isLoading && chartData.datasets.length" class="chart-container">
        <canvas baseChart
                [data]="chartData"
                [options]="chartOptions"
                type="bar"></canvas>
      </div>
      <div *ngIf="!isLoading && !chartData.datasets.length" class="no-data">
        <mat-icon>inbox</mat-icon>
        <p>Aucune donnée disponible</p>
      </div>
    </mat-card-content>
  </mat-card>

  <app-expense-chart></app-expense-chart>
</div>
